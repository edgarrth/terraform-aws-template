name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      workload:
        description: "Target workload"
        required: true
        default: "payments"
        type: choice
        options: [payments]
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, qa, prod]
      layer:
        description: "Layer to deploy"
        required: true
        type: choice
        options: [foundation, network, platform, data, observability]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.workload }} / ${{ github.event.inputs.environment }} / ${{ github.event.inputs.layer }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install Conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Deploy selected layer
        run: bash ./scripts/deploy.sh "${{ github.event.inputs.workload }}" "${{ github.event.inputs.environment }}" "${{ github.event.inputs.layer }}" "${{ github.event.inputs.action }}"
