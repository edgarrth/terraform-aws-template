name: Validate IaC Standards

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "terraform/**"
      - "policy/**"
      - "scripts/**"
      - "ansible/**"
      - ".github/workflows/validate-standards.yml"
  workflow_dispatch:
    inputs:
      workload:
        description: "Workload to validate"
        required: true
        default: "payments"
        type: choice
        options: [payments]
      environment:
        description: "Environment to validate"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, prod]
      layer:
        description: "Layer to validate"
        required: true
        default: "all"
        type: choice
        options: [all, foundation, network, platform, data, observability]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  validate:
    name: Terraform, Checkov and Standards
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      AWS_REGION: us-east-1
      CHECKOV_RESULTS: checkov-results.sarif

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Validate naming, tags and Terraform syntax
        run: |
          WORKLOAD="${{ github.event.inputs.workload || 'payments' }}"
          ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
          LAYER="${{ github.event.inputs.layer || 'all' }}"
          bash ./scripts/validate-standards.sh "$WORKLOAD" "$ENVIRONMENT" "$LAYER"

      - name: Run Checkov security scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: true
          config_file: .checkov.yml

      - name: Upload Checkov SARIF
        if: ${{ always() && hashFiles('checkov-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
